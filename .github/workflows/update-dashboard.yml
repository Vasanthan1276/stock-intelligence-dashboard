name: Update Stock Intelligence Dashboard

on:
  workflow_dispatch:

  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

jobs:

  update-dashboard:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Micron deep-dive report
        run: |
          python main.py

      - name: Move Micron report to dedicated page
        run: |
          mkdir -p docs/micron
          cp docs/index.html docs/micron/index.html

      - name: Generate main dashboard and stock detail pages
        run: |
          python dashboard.py

      - name: Commit updated dashboards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          git diff --staged --quiet || git commit -m "Update stock intelligence dashboards"

          git push
